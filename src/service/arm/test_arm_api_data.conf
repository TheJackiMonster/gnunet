@INLINE@ ../../../contrib/conf/gnunet/no_forcestart.conf
@INLINE@ ../../../contrib/conf/gnunet/no_autostart_above_core.conf

[PATHS]
GNUNET_TEST_HOME = $GNUNET_TMP/test-gnunet-arm/

[arm]
BINARY = gnunet-service-arm
OPTIONS = -L INFO
#PREFIX = valgrind --tool=memcheck --leak-check=yes

[TESTING]
WEAKRANDOM = YES

[resolver]
START_ON_DEMAND = YES
PORT = 23355
# PREFIX = valgrind

[do-nothing]
START_ON_DEMAND = NO
PORT = 48223
HOSTNAME = localhost
BINARY = /will/be/overwritten/by/test_exponential_backoff
ACCEPT_FROM = 127.0.0.1;
ACCEPT_FROM6 = ::1;

[statistics]
START_ON_DEMAND = YES

[core]
START_ON_DEMAND = NO

[transport]
START_ON_DEMAND = NO

[nat]
START_ON_DEMAND = NO

[rps]
START_ON_DEMAND = NO

[pils]
IMMEDIATE_START = NO
START_ON_DEMAND = NO

[peerstore]
IMMEDIATE_START = NO

[communicator-udp]
IMMEDIATE_START = NO

[communicator-tcp]
IMMEDIATE_START = NO
